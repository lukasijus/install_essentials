set -g mode-keys vi
set -g set-clipboard on
set -g update-environment "DISPLAY WAYLAND_DISPLAY XDG_RUNTIME_DIR SSH_AUTH_SOCK"
set -g mouse on
set -g history-limit 100000

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel \; run-shell 'tmux save-buffer - | sh -c "if command -v wl-copy >/dev/null 2>&1; then wl-copy; elif command -v xclip >/dev/null 2>&1; then xclip -selection clipboard; elif command -v xsel >/dev/null 2>&1; then xsel --clipboard --input; else cat >/dev/null; fi"'
bind-key -T copy-mode-vi Y send-keys -X copy-line-and-cancel \; run-shell 'tmux save-buffer - | sh -c "if command -v wl-copy >/dev/null 2>&1; then wl-copy; elif command -v xclip >/dev/null 2>&1; then xclip -selection clipboard; elif command -v xsel >/dev/null 2>&1; then xsel --clipboard --input; else cat >/dev/null; fi"'
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
