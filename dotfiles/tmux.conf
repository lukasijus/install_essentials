set -g mode-keys vi
set -g set-clipboard on
set -g update-environment "DISPLAY WAYLAND_DISPLAY XDG_RUNTIME_DIR SSH_AUTH_SOCK"
set -g mouse on
set -g history-limit 100000
set -g @copy_to_clipboard 'sh -c "if command -v wl-copy >/dev/null 2>&1 && [ -n \"${WAYLAND_DISPLAY:-}\" ] && [ -S \"${XDG_RUNTIME_DIR:-}/${WAYLAND_DISPLAY}\" ]; then exec wl-copy; elif command -v xclip >/dev/null 2>&1 && [ -n \"${DISPLAY:-}\" ]; then exec xclip -selection clipboard; elif command -v xsel >/dev/null 2>&1 && [ -n \"${DISPLAY:-}\" ]; then exec xsel --clipboard --input; else cat >/dev/null; exit 1; fi"'

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi y send-keys -X copy-pipe-line "#{@copy_to_clipboard}" \; send-keys -X cancel
bind-key -T copy-mode-vi Y send-keys -X copy-pipe-line "#{@copy_to_clipboard}" \; send-keys -X cancel
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "#{@copy_to_clipboard}"
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
